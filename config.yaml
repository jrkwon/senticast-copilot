# SentiCast Configuration

# ─────────────────────────────────────────────
# Data
# ─────────────────────────────────────────────
data:
  prices_path: "data/sample/prices.csv"
  news_path: "data/sample/news.csv"
  minerals: ["gold", "silver", "copper"]
  lookback: 180          # input window (days)
  horizons: [30, 90, 180]  # prediction horizons (days)
  news_embed_dim: 384    # sentence-transformer embedding size
  # Normalization: "zscore" or "minmax"
  normalization: "zscore"
  # Missing value interpolation method
  fill_method: "linear"

# ─────────────────────────────────────────────
# Rolling-Forward Split
# ─────────────────────────────────────────────
split:
  train_ratio: 0.60
  val_ratio: 0.20
  test_ratio: 0.20
  # Rolling step (days) for evaluation
  roll_step: 30

# ─────────────────────────────────────────────
# Model
# ─────────────────────────────────────────────
model:
  name: "SentiCast"          # model class to use
  d_model: 128               # core embedding dimension
  n_heads: 8                 # transformer attention heads
  n_layers: 4                # transformer encoder layers
  dropout: 0.1

  # GLAFF (Global-Local Adaptive Feature Fusion)
  glaff:
    top_k_freqs: 5           # number of dominant frequencies to retain
    local_kernel_sizes: [3, 7, 14]  # multi-scale local convolution kernels

  # Diffusion backbone
  diffusion:
    num_steps: 100           # DDPM diffusion steps
    beta_start: 1.0e-4
    beta_end: 0.02
    # Inference steps (DDIM acceleration)
    inference_steps: 20
    schedule: "linear"       # "linear" or "cosine"

  # Mixture of Experts
  moe:
    num_experts: 4
    top_k: 2                 # active experts per token
    capacity_factor: 1.25    # expert capacity multiplier
    aux_loss_coeff: 0.01     # load-balancing loss coefficient

  # News encoder
  news:
    embed_dim: 384           # input embedding size (matches sentence-transformer)
    proj_dim: 128            # projected dimension (matches d_model)
    num_heads: 4             # cross-attention heads for news–series fusion

# ─────────────────────────────────────────────
# Training
# ─────────────────────────────────────────────
training:
  epochs: 100
  batch_size: 32
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  # Learning-rate scheduler: "cosine" or "plateau"
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping_patience: 15
  gradient_clip: 1.0
  # Loss weights per horizon (30d, 90d, 180d)
  horizon_weights: [1.0, 0.8, 0.6]
  # Quantile regression for confidence intervals
  quantiles: [0.05, 0.50, 0.95]
  seed: 42

# ─────────────────────────────────────────────
# Evaluation
# ─────────────────────────────────────────────
evaluation:
  # Interval Coverage Probability target
  icp_alpha: 0.90
  metrics: ["icp", "miw", "pearson", "mae", "mse", "mape"]

# ─────────────────────────────────────────────
# Output
# ─────────────────────────────────────────────
output:
  checkpoint_dir: "checkpoints"
  results_dir: "results"
  figures_dir: "figures"
  log_dir: "logs"
